<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальный плеер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .player-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 95vh;
        }

        .player-header {
            background: linear-gradient(45deg, #4a90e2, #6c5ce7);
            color: white;
            padding: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .player-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .player-header p {
            opacity: 0.9;
            font-size: 12px;
        }

        /* Новые стили для ввода ссылки */
        .url-input-section {
            padding: 15px;
            background: white;
            border-bottom: 1px solid #eee;
            flex-shrink: 0;
        }

        .url-input-section label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }

        .url-input-container {
            display: flex;
            gap: 10px;
        }

        #folderUrl {
            flex: 1;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        #folderUrl:focus {
            outline: none;
            border-color: #4a90e2;
        }

        #loadBtn {
            background: linear-gradient(45deg, #4a90e2, #6c5ce7);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: opacity 0.3s;
            white-space: nowrap;
        }

        #loadBtn:hover {
            opacity: 0.9;
        }

        #loadBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .example-link {
            margin-top: 8px;
            font-size: 12px;
            color: #999;
        }

        .example-link a {
            color: #4a90e2;
            text-decoration: none;
        }

        .example-link a:hover {
            text-decoration: underline;
        }

        .now-playing {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #eee;
            background: white;
            flex-shrink: 0;
        }

        .track-info {
            margin-bottom: 10px;
        }

        .track-name {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }

        .track-artist {
            font-size: 14px;
            color: #666;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .control-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #666;
            transition: color 0.3s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            color: #4a90e2;
        }

        .control-btn.play-btn {
            background: linear-gradient(45deg, #4a90e2, #6c5ce7);
            color: white;
            width: 50px;
            height: 50px;
            font-size: 24px;
            border-radius: 50%;
        }

        .playlist {
            background: #f8f9fa;
            padding: 15px;
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .playlist-header {
            margin-bottom: 15px;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            background: #f8f9fa;
            z-index: 10;
            padding-bottom: 10px;
        }

        .playlist-header h3 {
            color: #333;
            font-size: 18px;
            padding-bottom: 8px;
            border-bottom: 2px solid #4a90e2;
        }

        .stats {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        #foldersContainer {
            overflow-y: auto;
            padding-right: 5px;
        }

        .folder-section {
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            background: white;
        }

        .folder-header {
            background: linear-gradient(45deg, #4a90e2, #6c5ce7);
            color: white;
            padding: 10px 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .folder-header:hover {
            opacity: 0.9;
        }

        .folder-header.collapsed .arrow {
            transform: rotate(-90deg);
        }

        .folder-count {
            font-size: 11px;
            background: rgba(255,255,255,0.2);
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 8px;
        }

        .arrow {
            font-size: 12px;
            transition: transform 0.3s;
        }

        .folder-songs {
            list-style: none;
            padding: 5px 0;
            max-height: 300px;
            overflow-y: auto;
        }

        .folder-songs li {
            padding: 8px 12px;
            margin: 2px 5px;
            background: #f8f9fa;
            border-radius: 5px;
            cursor: pointer;
            border: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        .folder-songs li:hover {
            background: #e8eef5;
            border-color: #4a90e2;
        }

        .folder-songs li.active {
            background: linear-gradient(45deg, #4a90e2, #6c5ce7);
            color: white;
            border: none;
        }

        .song-name {
            font-weight: 500;
        }

        .song-artist {
            font-size: 11px;
            color: #999;
            margin-left: 8px;
        }

        .folder-songs li.active .song-artist {
            color: rgba(255, 255, 255, 0.8);
        }

        .loading, .error {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .error {
            color: #e74c3c;
            background: #fde8e8;
            border-radius: 8px;
        }

        #foldersContainer::-webkit-scrollbar,
        .folder-songs::-webkit-scrollbar {
            width: 6px;
        }

        #foldersContainer::-webkit-scrollbar-track,
        .folder-songs::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }

        #foldersContainer::-webkit-scrollbar-thumb,
        .folder-songs::-webkit-scrollbar-thumb {
            background: #4a90e2;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="player-header">
            <h1>🎵 Music Player</h1>
            <p>Вставь ссылку на папку Яндекс.Диска</p>
        </div>

        <!-- Новый блок для ввода ссылки -->
        <div class="url-input-section">
            <label for="folderUrl">Ссылка на папку Яндекс.Диска:</label>
            <div class="url-input-container">
                <input type="url" id="folderUrl" placeholder="https://disk.yandex.ru/d/..." value="https://disk.yandex.ru/d/jS_P1W-ZUmXr8g">
                <button id="loadBtn">Загрузить</button>
            </div>
            <div class="example-link">
                Пример: <a href="#" onclick="setExampleUrl(); return false;">https://disk.yandex.ru/d/jS_P1W-ZUmXr8g</a>
            </div>
        </div>

        <div class="now-playing">
            <div class="track-info">
                <div class="track-name" id="currentTrack">Нет трека</div>
                <div class="track-artist" id="currentArtist">Вставь ссылку и нажми Загрузить</div>
            </div>

            <div class="controls">
                <button class="control-btn" id="prevBtn">⏮️</button>
                <button class="control-btn play-btn" id="playBtn">▶️</button>
                <button class="control-btn" id="nextBtn">⏭️</button>
            </div>
        </div>

        <div class="playlist">
            <div class="playlist-header">
                <h3>📋 Плейлист по папкам</h3>
                <div id="stats" class="stats"></div>
            </div>
            
            <div id="loadingMessage" class="loading" style="display: none;">🔍 Сканируем папки...</div>
            <div id="progressMessage" class="loading" style="display: none;"></div>
            <div id="errorMessage" class="error" style="display: none;"></div>
            <div id="foldersContainer"></div>
        </div>

        <audio id="audioPlayer" preload="auto"></audio>
    </div>

    <script>
        // Переменные плеера
        let allTracks = [];
        let currentTrack = 0;
        let isPlaying = false;
        let currentFolderUrl = '';
        
        // Элементы DOM
        const audioPlayer = document.getElementById('audioPlayer');
        const trackNameEl = document.getElementById('currentTrack');
        const trackArtistEl = document.getElementById('currentArtist');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const foldersContainer = document.getElementById('foldersContainer');
        const loadingMessage = document.getElementById('loadingMessage');
        const progressMessage = document.getElementById('progressMessage');
        const errorMessage = document.getElementById('errorMessage');
        const statsEl = document.getElementById('stats');
        const folderUrlInput = document.getElementById('folderUrl');
        const loadBtn = document.getElementById('loadBtn');

        // Функция для установки примера ссылки
        function setExampleUrl() {
            folderUrlInput.value = 'https://disk.yandex.ru/d/jS_P1W-ZUmXr8g';
        }

        // === ФУНКЦИЯ ДЛЯ ПОЛУЧЕНИЯ ВСЕХ ЭЛЕМЕНТОВ ИЗ ПАПКИ (С ПАГИНАЦИЕЙ) ===
        async function getAllFolderItems(publicKey, folderPath = '') {
            let allItems = [];
            let offset = 0;
            const limit = 100;
            
            try {
                while (true) {
                    let url = `https://cloud-api.yandex.net/v1/disk/public/resources?public_key=${publicKey}&limit=${limit}&offset=${offset}`;
                    if (folderPath) {
                        url += `&path=${encodeURIComponent(folderPath)}`;
                    }
                    
                    console.log(`📖 Загружаем страницу ${offset/limit + 1} папки:`, folderPath || 'корень');
                    
                    const response = await fetch(url);
                    
                    if (!response.ok) {
                        console.warn('Ошибка загрузки:', folderPath);
                        break;
                    }
                    
                    const data = await response.json();
                    
                    if (data._embedded && data._embedded.items) {
                        allItems = [...allItems, ...data._embedded.items];
                        
                        if (data._embedded.items.length < limit) {
                            break;
                        }
                        
                        offset += limit;
                        
                        progressMessage.textContent = `📁 Сканируем ${folderPath || 'корень'}... найдено ${allItems.length} элементов`;
                    } else {
                        break;
                    }
                }
            } catch (error) {
                console.error('Ошибка при загрузке элементов:', error);
            }
            
            return allItems;
        }

        // === РЕКУРСИВНАЯ ФУНКЦИЯ ДЛЯ СКАНИРОВАНИЯ ВСЕХ ПАПОК ===
        async function scanFolder(publicKey, folderPath = '', folderName = 'Корневая папка', depth = 0) {
            progressMessage.style.display = 'block';
            progressMessage.textContent = `📁 Сканируем: ${folderName} (глубина ${depth})`;
            
            const items = await getAllFolderItems(publicKey, folderPath);
            
            console.log(`📁 Папка "${folderName}" содержит ${items.length} элементов`);
            
            const currentFolder = {
                name: folderName,
                path: folderPath,
                songs: [],
                subFolders: []
            };
            
            // Сначала собираем все подпапки
            const subFolders = items.filter(item => item.type === 'dir');
            console.log(`📂 Найдено подпапок: ${subFolders.length}`);
            
            // Сканируем каждую подпапку
            for (const subFolder of subFolders) {
                const subFolderData = await scanFolder(publicKey, subFolder.path, subFolder.name, depth + 1);
                if (subFolderData.songs.length > 0 || subFolderData.subFolders.length > 0) {
                    currentFolder.subFolders.push(subFolderData);
                }
            }
            
            // Теперь собираем MP3 файлы из текущей папки
            const mp3Files = items.filter(item => 
                item.type === 'file' && item.name.toLowerCase().endsWith('.mp3')
            );
            
            console.log(`🎵 Найдено MP3: ${mp3Files.length} в папке ${folderName}`);
            
            // Обрабатываем каждый MP3 файл
            for (const mp3 of mp3Files) {
                try {
                    const downloadUrl = `https://cloud-api.yandex.net/v1/disk/public/resources/download?public_key=${publicKey}&path=${encodeURIComponent(mp3.path)}`;
                    const downloadResponse = await fetch(downloadUrl);
                    const downloadData = await downloadResponse.json();
                    
                    let songName = mp3.name.replace(/\.mp3$/i, '');
                    let artist = folderName === 'Корневая папка' ? 'Неизвестен' : folderName;
                    
                    if (songName.includes(' - ')) {
                        const parts = songName.split(' - ');
                        artist = parts[0].trim();
                        songName = parts[1].trim();
                    }
                    
                    const track = {
                        name: songName,
                        artist: artist,
                        url: downloadData.href,
                        folder: folderName,
                        originalName: mp3.name
                    };
                    
                    currentFolder.songs.push(track);
                    allTracks.push(track);
                    
                    statsEl.textContent = `📊 Найдено треков: ${allTracks.length}`;
                    
                } catch (dlError) {
                    console.error('Ошибка получения ссылки для:', mp3.name);
                }
            }
            
            return currentFolder;
        }

        // === ФУНКЦИЯ ДЛЯ ОТОБРАЖЕНИЯ ПАПОК ===
        function renderFolder(folder, container) {
            if (folder.songs.length === 0 && folder.subFolders.length === 0) return;
            
            const folderSection = document.createElement('div');
            folderSection.className = 'folder-section';
            
            const folderHeader = document.createElement('div');
            folderHeader.className = 'folder-header';
            
            let title = `📁 ${folder.name}`;
            if (folder.songs.length > 0) {
                title += ` <span class="folder-count">${folder.songs.length}</span>`;
            }
            
            folderHeader.innerHTML = `
                <span>${title}</span>
                <span class="arrow">▼</span>
            `;
            
            const contentContainer = document.createElement('div');
            contentContainer.className = 'folder-content';
            
            if (folder.songs.length > 0) {
                const songsList = document.createElement('ul');
                songsList.className = 'folder-songs';
                
                folder.songs.forEach(song => {
                    const globalIndex = allTracks.findIndex(t => 
                        t.name === song.name && t.artist === song.artist && t.folder === song.folder
                    );
                    
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <span>
                            <span class="song-name">${song.name}</span>
                            <span class="song-artist">${song.artist}</span>
                        </span>
                        <span>🎵</span>
                    `;
                    
                    li.onclick = () => playTrack(globalIndex);
                    
                    if (globalIndex === currentTrack) {
                        li.classList.add('active');
                    }
                    
                    songsList.appendChild(li);
                });
                
                contentContainer.appendChild(songsList);
            }
            
            if (folder.subFolders.length > 0) {
                folder.subFolders.forEach(subFolder => {
                    renderFolder(subFolder, contentContainer);
                });
            }
            
            folderHeader.onclick = () => {
                folderHeader.classList.toggle('collapsed');
                if (contentContainer.style.display === 'none') {
                    contentContainer.style.display = 'block';
                } else {
                    contentContainer.style.display = 'none';
                }
            };
            
            folderSection.appendChild(folderHeader);
            folderSection.appendChild(contentContainer);
            container.appendChild(folderSection);
        }

        // === ФУНКЦИЯ ДЛЯ ЗАГРУЗКИ ПО ССЫЛКЕ ===
        async function loadFromUrl() {
            const url = folderUrlInput.value.trim();
            
            if (!url) {
                alert('Вставь ссылку на папку Яндекс.Диска');
                return;
            }
            
            if (!url.includes('disk.yandex.ru')) {
                alert('Это не похоже на ссылку Яндекс.Диска');
                return;
            }
            
            try {
                // Очищаем предыдущие данные
                allTracks = [];
                currentTrack = 0;
                isPlaying = false;
                playBtn.textContent = '▶️';
                foldersContainer.innerHTML = '';
                
                // Показываем загрузку
                loadingMessage.style.display = 'block';
                progressMessage.style.display = 'none';
                errorMessage.style.display = 'none';
                loadBtn.disabled = true;
                
                trackNameEl.textContent = 'Загрузка...';
                trackArtistEl.textContent = 'Сканируем папки';
                statsEl.textContent = '';
                
                const rootFolder = await scanFolder(url, '', 'Корневая папка', 0);
                
                if (allTracks.length === 0) {
                    throw new Error('В папке не найдено MP3 файлов');
                }
                
                console.log('✅ Всего найдено треков:', allTracks.length);
                
                loadingMessage.style.display = 'none';
                progressMessage.style.display = 'none';
                
                renderFolder(rootFolder, foldersContainer);
                
                statsEl.textContent = `✅ Найдено треков: ${allTracks.length}`;
                
                if (allTracks.length > 0) {
                    loadTrack(0);
                }
                
            } catch (error) {
                console.error('❌ Ошибка:', error);
                loadingMessage.style.display = 'none';
                progressMessage.style.display = 'none';
                errorMessage.style.display = 'block';
                errorMessage.textContent = 'Ошибка: ' + error.message;
                trackNameEl.textContent = 'Ошибка';
                trackArtistEl.textContent = 'Не удалось загрузить';
            } finally {
                loadBtn.disabled = false;
            }
        }

        function loadTrack(index) {
            if (allTracks.length === 0) return;
            
            currentTrack = index;
            const track = allTracks[index];
            
            trackNameEl.textContent = track.name;
            trackArtistEl.textContent = track.artist + ' 📁 ' + track.folder;
            audioPlayer.src = track.url;
            
            document.querySelectorAll('.folder-songs li').forEach(li => {
                li.classList.remove('active');
            });
            
            setTimeout(() => {
                const items = document.querySelectorAll('.folder-songs li');
                if (items[index]) {
                    items[index].classList.add('active');
                }
            }, 100);
            
            if (isPlaying) {
                audioPlayer.play().catch(() => {});
            }
        }

        function togglePlay() {
            if (allTracks.length === 0) return;
            
            if (isPlaying) {
                audioPlayer.pause();
                playBtn.textContent = '▶️';
                isPlaying = false;
            } else {
                audioPlayer.play().catch(() => {});
                playBtn.textContent = '⏸️';
                isPlaying = true;
            }
        }

        function nextTrack() {
            if (allTracks.length === 0) return;
            
            let next = currentTrack + 1;
            if (next >= allTracks.length) {
                next = 0;
            }
            loadTrack(next);
        }

        function prevTrack() {
            if (allTracks.length === 0) return;
            
            let prev = currentTrack - 1;
            if (prev < 0) {
                prev = allTracks.length - 1;
            }
            loadTrack(prev);
        }

        function playTrack(index) {
            if (allTracks.length === 0) return;
            
            loadTrack(index);
            audioPlayer.play().catch(() => {});
            playBtn.textContent = '⏸️';
            isPlaying = true;
        }

        // Обработчики
        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prevTrack);
        nextBtn.addEventListener('click', nextTrack);
        
        audioPlayer.addEventListener('ended', () => {
            nextTrack();
        });

        loadBtn.addEventListener('click', loadFromUrl);
        
        folderUrlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loadFromUrl();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
    </script>
</body>
</html>
